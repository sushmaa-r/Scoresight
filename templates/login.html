{% extends "base.html" %}
{% block title %}Login | EPL Predictor{% endblock %}

{% block content %}

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: url("/static/bg.jpg.webp") no-repeat center center/cover;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    top: 0;
    left: 0;
    z-index: 0;
}

/* Full screen center */
.full-screen {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass effect card */
.login-card {
    width: 500px;
    padding: 40px;
    border-radius: 15px;
    background: rgba(0, 0, 0, 0.7); /* darker = premium */
    backdrop-filter: blur(10px);
    color: white;
}

/* Title glow */
h1 {
    text-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Input styling */
.form-control {
    padding: 14px;
    font-size: 16px;
}

/* Button styling */
.btn-primary {
    padding: 12px;
    font-size: 16px;
    transition: 0.3s;
}

/* Button hover */
.btn-primary:hover {
    transform: scale(1.05);
}

/* Smooth transition */
* {
    transition: all 0.3s ease-in-out;
}
</style>

<div class="container-fluid full-screen">

  <div>
    <!-- 🔥 Title + Tagline -->
    <h1 class="text-center text-white fw-bold display-4">
      EPL Predictor⚽
    </h1>

    <p class="text-center text-light mb-4 fs-5">
      Predict. Analyze. Dominate the Game.
    </p>

    <!-- Login Card -->
    <div class="login-card shadow-lg text-center">
      <h2 class="mb-4">🔐 Login</h2>

      <form method="POST" action="{{ url_for('login') }}">
        
        <!-- Username -->
        <div class="mb-3">
          <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <!-- Password -->
        <div class="mb-3 position-relative">
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
          
          <button type="button" class="btn toggle-password"
            style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); border: none; background: none; color: white;">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <!-- Login button -->
        <button type="submit" class="btn btn-primary w-100">
          Login
        </button>
      </form>

      <p class="mt-3">
        Don't have an account?
        <a href="{{ url_for('signup') }}" class="text-warning text-decoration-none">Sign Up</a>
      </p>
    </div>

  </div>

</div>

<!-- Password Toggle Script -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const toggleBtns = document.querySelectorAll(".toggle-password");
  toggleBtns.forEach(btn => {
    btn.addEventListener("click", function() {
      const input = this.parentElement.querySelector("input");
      const icon = this.querySelector("i");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    });
  });
});
</script>

{% endblock %}
